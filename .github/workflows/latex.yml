name: Build LaTeX

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Build LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: thesis.tex
          args: >
            -pdf
            -interaction=nonstopmode
            -file-line-error
            -synctex=1
            -outdir=build
            -use-make
          extra_packages: biber
          extra_system_packages: biber

      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: thesis-pdf
          path: build/thesis.pdf
          if-no-files-found: error
          retention-days: 14
