name: Build LaTeX
on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: xu-cheng/latex-action@v3
        with:
          root_file: thesis.tex
          args: -pdf -interaction=nonstopmode -file-line-error -synctex=1 -outdir=build
          extra_system_packages: biber

      - uses: actions/upload-artifact@v4
        with:
          name: thesis-pdf
          path: build/thesis.pdf

